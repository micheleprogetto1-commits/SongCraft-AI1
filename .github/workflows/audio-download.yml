name: Download Freesound Audio

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Freesound search query"
        required: false
        default: "gaming music"
      max_files:
        description: "Maximum number of files to download"
        required: false
        default: "1500"
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  download-audio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Download audio assets
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python download_audio.py

      - name: Commit and push changes
        run: |
          # Controlla se la cartella downloads esiste ed ha file al suo interno
          if [ -d "downloads" ]; then
            git add downloads/
          fi
          
          # Verifica se ci sono reali modifiche da caricare
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Automate Freesound audio download [skip ci]"
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
