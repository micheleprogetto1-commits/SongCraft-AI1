name: Download Pixabay Audio

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Pixabay search query"
        required: false
        default: "music"
      max_files:
        description: "Maximum number of files to download"
        required: false
        default: "1000"
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  download-audio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download audio assets
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PIXABAY_QUERY: ${{ github.event.inputs.query || 'music' }}
          PIXABAY_MAX_FILES: ${{ github.event.inputs.max_files || '1000' }}
          PIXABAY_OUTPUT_DIR: audio_assets
          PIXABAY_DELAY_SECONDS: "1.5"
          PIXABAY_PER_PAGE: "200"
        run: |
          python download_audio.py

      - name: Commit and push changes
        run: |
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio_assets requirements.txt download_audio.py .github/workflows/audio-download.yml
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi
          git commit -m "Automate Pixabay audio download"
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
