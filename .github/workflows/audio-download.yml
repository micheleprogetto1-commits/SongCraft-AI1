name: Download Freesound Audio (Manuale)

on:
  workflow_dispatch:
    inputs:
      pagina:
        description: "Numero della pagina di Freesound da esplorare (1, 2, 3, 4...)"
        required: true
        default: "1"
      dimensione_blocco:
        description: "Quanti brani vuoi tentare di scaricare? (Max 150)"
        required: true
        default: "100"

permissions:
  contents: write

jobs:
  download-audio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Download audio assets
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          INPUT_PAGINA: ${{ github.event.inputs.pagina }}
          INPUT_BLOCCO: ${{ github.event.inputs.dimensione_blocco }}
        run: |
          python download_audio.py
          - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Aggiunge solo i file nuovi nella cartella downloads
          git add downloads/
          
          # Se non ci sono cambiamenti, esce senza errori
          if git diff --cached --quiet; then
            echo "Nessun nuovo brano da caricare."
            exit 0
          fi
          
          git commit -m "Aggiunto blocco manuale [skip ci]"
          
          # Tenta il push forzato solo dei nuovi file
          git push origin HEAD:${GITHUB_REF_NAME}
